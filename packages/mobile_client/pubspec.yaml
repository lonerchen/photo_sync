name: mobile_client
description: Mobile Flutter app for photo upload, browsing, and cleanup.
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  common:
    path: ../common
  photo_manager_ui:
    path: ../photo_manager_ui
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  photo_manager: ^3.3.0
  web_socket_channel: ^3.0.0
  multicast_dns: ^0.3.2
  http: ^1.2.0
  device_info_plus: ^11.1.0
  cached_network_image: ^3.3.0
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0

flutter:
  uses-material-design: true
