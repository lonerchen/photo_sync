name: storage_server
description: Desktop Flutter app for receiving, storing, and serving photos.
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  common:
    path: ../common
  photo_manager_ui:
    path: ../photo_manager_ui
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.0
  multicast_dns: ^0.3.2
  image: ^4.1.0
  cached_network_image: ^3.3.0
  photo_view: ^0.15.0

dev_dependencies:
  test: ^1.24.0

flutter:
  uses-material-design: true
